<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBM Admin</title>
    <link rel="icon" type="image/svg+xml" href="https://upload.wikimedia.org/wikipedia/commons/5/53/Pok%C3%A9_Ball_icon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root { --bg: #0a0a15; --card: rgba(26,26,46,0.95); --accent: #00eeff; --purple: #9d4edd; --text: #ffffff; --gold: #ffd700; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 1.5rem; min-height: 100vh; margin: 0; }
        .suicune-bg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 800px; opacity: 0.1; z-index: -1; pointer-events: none; filter: drop-shadow(0 0 80px var(--accent)); }
        
        .container { max-width: 650px; margin: 0 auto; position: relative; z-index: 1; }
        h1 { text-align: center; color: var(--accent); margin-bottom: 2rem; font-weight: 900; font-size: 2rem; letter-spacing: 1px; }
        .card { background: var(--card); padding: 1.5rem; border-radius: 16px; border: 1px solid rgba(0,238,255,0.2); margin-bottom: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        label { display: block; margin-bottom: 0.4rem; color: #aaa; font-weight: 600; font-size: 0.85rem; }
        input, select { width: 100%; padding: 12px; margin-bottom: 1rem; background: rgba(0,0,0,0.5); border: 1px solid #444; color: white; border-radius: 8px; font-size: 1rem; }
        input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 10px rgba(0,238,255,0.2); }
        input[type="datetime-local"] { color-scheme: dark; cursor: pointer; border: 1px solid var(--accent); }
        
        input[type="file"] { background: rgba(255,255,255,0.05); padding: 10px; border: 1px dashed #555; cursor: pointer; font-size: 0.9rem; }
        input[type="file"]::file-selector-button { background: var(--accent); color: #000; font-weight: 800; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-right: 10px; transition: 0.3s; }
        input[type="file"]::file-selector-button:hover { background: #fff; }

        .flex-row { display: flex; gap: 15px; width: 100%; }
        .flex-row > div { flex: 1; }

        button.primary-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--accent), var(--purple)); color: white; font-weight: 900; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 1.1rem; transition: 0.3s; box-shadow: 0 5px 20px rgba(157, 78, 221, 0.4); }
        button.primary-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .inventory-controls { display: flex; flex-direction: column; gap: 15px; margin-bottom: 1.5rem; }
        .search-box { position: relative; width: 100%; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--accent); font-size: 1.2rem; }
        .search-box input { padding-left: 45px; margin-bottom: 0; background: rgba(0,0,0,0.6); border: 1px solid rgba(0, 238, 255, 0.3); border-radius: 12px; transition: 0.3s; }
        .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 238, 255, 0.2); }
        
        .tab-container { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .tab-container::-webkit-scrollbar { display: none; }
        .inv-tab { flex: 1; min-width: max-content; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #aaa; padding: 10px 15px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 6px; box-shadow: none; text-transform: uppercase; font-size: 0.85rem; }
        .inv-tab:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .inv-tab.active { background: linear-gradient(135deg, rgba(0, 238, 255, 0.15), rgba(157, 78, 221, 0.15)); border-color: var(--accent); color: #fff; box-shadow: 0 0 15px rgba(0, 238, 255, 0.2); }

        ul { padding: 0; margin: 0; }
        li { background: rgba(255,255,255,0.05); padding: 1.2rem; margin-bottom: 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); list-style: none; display: flex; flex-direction: column; gap: 1rem; transition: 0.3s; }
        li:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
        
        .item-content { flex: 1; }
        .item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        .item-title { font-weight: 800; font-size: 1.15rem; line-height: 1.3; color: #fff; }
        .item-meta { font-size: 0.85rem; color: #aaa; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 5px; }
        
        .badge { padding: 4px 10px; font-size: 0.7rem; border-radius: 6px; font-weight: 800; text-transform: uppercase; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
        .b-msrp { color: #00ff9d; border: 1px solid #00ff9d; background: linear-gradient(135deg, rgba(0, 255, 157, 0.15), transparent); }
        .b-bundle { color: #f0dfff; border: 1px solid var(--purple); background: linear-gradient(135deg, rgba(213, 0, 255, 0.25), rgba(100, 0, 255, 0.15)); }
        .b-baller { background: var(--gold); color: #000; border: 1px solid var(--gold); box-shadow: 0 0 10px rgba(255, 215, 0, 0.4); }
        
        .b-slab { background: #1a1a3a; color: #d500ff; border: 1px solid #d500ff; }
        .b-psa { background: rgba(50, 0, 0, 0.85); border: 1px solid #ff3333; color: #ff5555; }
        .b-bgs { background: rgba(40, 30, 0, 0.85); border: 1px solid #e6c27a; color: #e6c27a; }
        .b-cgc { background: rgba(0, 20, 40, 0.85); border: 1px solid #00d2ff; color: #00d2ff; }
        .b-sgc { background: #000; border: 1px solid #ffffff; color: #ffffff; }
        .b-ace { background: rgba(0, 30, 10, 0.85); border: 1px solid #00ff88; color: #00ff88; }
        
        .b-raw { background: #1a3a3a; color: #00ff9d; border: 1px solid #00ff9d; }
        .b-hidden { background: rgba(255, 68, 68, 0.2); color: #ff6666; border: 1px solid #ff4444; }
        .b-time { background: rgba(157, 78, 221, 0.2); color: #e0aaff; border: 1px solid var(--purple); }
        .b-cond { background: rgba(255,255,255,0.1); color: #ccc; border: 1px solid #777; }
        .click-badge { background: rgba(0, 184, 255, 0.15); color: #00b8ff; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
        
        .btn-group { display: flex; gap: 10px; width: 100%; }
        .btn-group button { padding: 10px; font-size: 0.9rem; font-weight: 800; border-radius: 6px; cursor: pointer; border: none; color: white; flex: 1; transition: 0.2s; }
        .btn-edit { background: #00b8ff; } .btn-edit:hover { background: #0088cc; }
        .btn-del { background: #ff0055; } .btn-del:hover { background: #cc0044; }
        
        #login-section { display: block; } #admin-section { display: none; }
        .empty-state { color: #888; font-style: italic; font-size: 1rem; padding: 2rem 0; text-align: center; background: rgba(0,0,0,0.3); border-radius: 12px; border: 1px dashed #444; }

        @media(max-width: 600px) { 
            .flex-row { flex-direction: column; gap: 0; }
            .flex-row > div { width: 100%; }
            .card { padding: 1.2rem; }
            h1 { font-size: 1.6rem; }
        }
        @media(min-width: 600px) { 
            li { flex-direction: row; align-items: center; justify-content: space-between; } 
            .btn-group { width: auto; flex-shrink: 0; flex-direction: column; gap: 8px; } 
            .btn-group button { padding: 8px 20px; width: 100%; } 
        }
    </style>
</head>
<body>
    <img src="https://assets.pokemon.com/assets/cms2/img/pokedex/full/245.png" class="suicune-bg">
    <div class="container">
        <h1><i class="ph-fill ph-shield-check"></i> PBM ADMIN</h1>
        
        <div id="login-section" class="card">
            <label>Username</label><input type="text" id="login-username">
            <label>Password</label><input type="password" id="login-password">
            <button class="primary-btn" onclick="login()">ENTER SYSTEM</button>
        </div>
        
        <div id="admin-section">
            <div class="card">
                <h2 style="margin-top:0; margin-bottom:1.5rem; font-size:1.4rem; border-bottom: 1px solid #333; padding-bottom: 10px;">Add / Edit Item</h2>
                
                <div class="flex-row">
                    <div>
                        <label>Item Type</label>
                        <select id="item-type">
                            <optgroup label="Live Breaks">
                                <option value="msrp">✅ MSRP Break</option>
                                <option value="bundle">💎 Bundle Break</option>
                                <option value="baller">👑 BALLER BUNDLE</option>
                            </optgroup>
                            <optgroup label="The Vault (Store)">
                                <option value="slab">🔍 Graded Slab</option>
                                <option value="raw">🃏 Raw Card</option>
                            </optgroup>
                        </select>
                    </div>
                    <div>
                        <label>Visibility</label>
                        <select id="item-hidden">
                            <option value="false">👁️ Public (Visible)</option>
                            <option value="true" style="color:#ff6666">🚫 Hidden (Draft)</option>
                        </select>
                    </div>
                </div>

                <div id="condition-container" style="display: none;">
                    <label style="color: #00ff9d;">⭐ Card Condition (Raw Cards Only)</label>
                    <select id="item-condition" style="border: 1px solid #00ff9d;">
                        <option value="Mint (M)">Mint (M)</option>
                        <option value="Near Mint (NM)">Near Mint (NM)</option>
                        <option value="Lightly Played (LP)">Lightly Played (LP)</option>
                        <option value="Moderately Played (MP)">Moderately Played (MP)</option>
                        <option value="Heavily Played (HP)">Heavily Played (HP)</option>
                        <option value="Damaged (DMG)">Damaged (DMG)</option>
                    </select>
                </div>

                <div id="grader-container" style="display: none;">
                    <label style="color: #d500ff;">🔍 Grading Company (Slabs Only)</label>
                    <select id="item-grader" style="border: 1px solid #d500ff;">
                        <option value="PSA">PSA</option>
                        <option value="BGS">BGS</option>
                        <option value="CGC">CGC</option>
                        <option value="SGC">SGC</option>
                        <option value="ACE">ACE</option>
                        <option value="MANA">Mana</option>
                        <option value="Other">Other Grader</option>
                    </select>
                </div>
                
                <div class="flex-row">
                    <div>
                        <label>🟢 Start Time (Optional)</label>
                        <input type="datetime-local" id="item-schedule-date">
                    </div>
                    <div>
                        <label>🔴 Close Time (Optional)</label>
                        <input type="datetime-local" id="item-schedule-end">
                    </div>
                </div>
                
                <label>Name (e.g. PSA 10 Base Set Charizard)</label>
                <input type="text" id="item-name" placeholder="Item Name">
                
                <label>Description</label>
                <input type="text" id="item-description" placeholder="Short description...">
                
                <div class="flex-row">
                    <div>
                        <label>Price ($)</label>
                        <input type="number" id="item-price" placeholder="0.00" step="0.01">
                    </div>
                    <div>
                        <label>Stock (Set to 1 for Singles)</label>
                        <input type="number" id="item-stock" value="1">
                    </div>
                </div>
                
                <label>Payment Link (PayPal.me / Stripe / Streamlabs)</label>
                <input type="url" id="item-google-form-link" placeholder="https://...">
                
                <label>Images (Select multiple files. Will auto-compress before upload.)</label>
                <input type="file" id="item-image" multiple accept="image/*">
                
                <button id="submit-btn" class="primary-btn" style="margin-top: 1rem;" onclick="submitItem()">Save to Database</button>
            </div>

            <h2 style="text-align:center; font-size: 1.8rem; margin-top: 3rem; margin-bottom: 1.5rem;">Inventory Management</h2>
            
            <div class="inventory-controls">
                <div class="search-box">
                    <i class="ph-bold ph-magnifying-glass"></i>
                    <input type="text" id="inventory-search" placeholder="Search by name, grader, or type..." onkeyup="renderInventory()">
                </div>
                <div class="tab-container">
                    <button class="inv-tab active" onclick="switchTab('all', this)"><i class="ph-fill ph-circles-four"></i> All</button>
                    <button class="inv-tab" onclick="switchTab('breaks', this)"><i class="ph-fill ph-monitor-play"></i> Breaks</button>
                    <button class="inv-tab" onclick="switchTab('slabs', this)"><i class="ph-fill ph-certificate"></i> Slabs</button>
                    <button class="inv-tab" onclick="switchTab('raw', this)"><i class="ph-fill ph-cards"></i> Raw</button>
                </div>
            </div>

            <ul id="inventory-list"></ul>

            <div style="display:flex; flex-direction:column; gap:15px; margin-top:3rem;">
                <button onclick="logout()" style="background:#222; border:1px solid #444; color:#fff; padding:12px; border-radius:8px; cursor:pointer; font-weight:700; text-transform:uppercase;">Log Out</button>
                <a href="index.html" style="text-align:center; color:#888; text-decoration:none; font-weight:600; padding:10px;">Return to Live Site</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://pokeballer-worker.kronborgnielsen.workers.dev/api';
        
        let allItems = [];
        let editingId = null;
        let currentImage = '';
        let currentImages = []; 
        let currentCreatedAt = null;
        let currentClicks = 0; 
        
        let currentTab = 'all';

        if(localStorage.getItem('adminToken')) {
            document.getElementById('login-section').style.display='none';
            document.getElementById('admin-section').style.display='block';
            loadItems();
        }

        document.getElementById('item-type').addEventListener('change', function() {
            const condContainer = document.getElementById('condition-container');
            const graderContainer = document.getElementById('grader-container');
            
            condContainer.style.display = 'none';
            graderContainer.style.display = 'none';

            if (this.value === 'raw') condContainer.style.display = 'block';
            if (this.value === 'slab') graderContainer.style.display = 'block';
        });

        function switchTab(tabName, btnElement) {
            currentTab = tabName;
            document.querySelectorAll('.inv-tab').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            renderInventory(); 
        }

        async function login() {
            const u = document.getElementById('login-username').value;
            const p = document.getElementById('login-password').value;
            try {
                const res = await fetch(`${API_URL}/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p}) });
                const data = await res.json();
                if(data.success) { localStorage.setItem('adminToken','1'); location.reload(); } 
                else alert('Invalid Credentials.');
            } catch(e) { alert('Server Error. Check console.'); }
        }

        // --- NEW COMPRESSION FUNCTION --- //
        // This converts huge 5MB phone photos into small 100KB web-friendly JPEGs before upload
        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; // Resize width limit
                        let scaleSize = MAX_WIDTH / img.width;
                        if(scaleSize > 1) scaleSize = 1; // Don't enlarge small images

                        canvas.width = img.width * scaleSize;
                        canvas.height = img.height * scaleSize;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8)); // 80% Quality JPEG
                    }
                }
            });
        }

        async function submitItem() {
            const btn = document.getElementById('submit-btn');
            btn.innerText = "Processing & Saving...";
            
            const type = document.getElementById('item-type').value;
            const hidden = document.getElementById('item-hidden').value === 'true';
            const condition = type === 'raw' ? document.getElementById('item-condition').value : null; 
            const grader = type === 'slab' ? document.getElementById('item-grader').value : null; 
            const scheduleDate = document.getElementById('item-schedule-date').value; 
            const scheduleEnd = document.getElementById('item-schedule-end').value; 
            const name = document.getElementById('item-name').value;
            const desc = document.getElementById('item-description').value;
            const price = parseFloat(document.getElementById('item-price').value);
            const stock = parseInt(document.getElementById('item-stock').value);
            const form = document.getElementById('item-google-form-link').value;
            
            const fileInput = document.getElementById('item-image');
            let imagesArray = editingId ? currentImages : [];
            
            if(fileInput.files.length > 0) {
                imagesArray = [];
                for(let i = 0; i < fileInput.files.length; i++) {
                    const compressedBase64 = await compressImage(fileInput.files[i]);
                    imagesArray.push(compressedBase64);
                }
            }
            
            let img = imagesArray.length > 0 ? imagesArray[0] : (editingId ? currentImage : '');

            const body = { 
                type, name, description:desc, price, stock, googleFormLink:form, 
                image: img, 
                images: imagesArray, 
                clickCount: editingId ? currentClicks : 0,
                createdAt: editingId ? currentCreatedAt : Date.now(),
                hidden: hidden,
                scheduleDate: scheduleDate,
                scheduleEnd: scheduleEnd,
                condition: condition,
                grader: grader
            };
            
            const url = editingId ? `${API_URL}/items/${editingId}` : `${API_URL}/items`;
            const method = editingId ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
                if(!response.ok) { alert("SERVER ERROR - Save failed."); btn.innerText = "Save to Database"; return; }

                editingId = null; currentImage = ''; currentImages = []; currentCreatedAt = null; currentClicks = 0;
                
                document.getElementById('item-name').value = '';
                document.getElementById('item-description').value = '';
                document.getElementById('item-price').value = '';
                document.getElementById('item-stock').value = '1';
                document.getElementById('item-google-form-link').value = '';
                document.getElementById('item-image').value = '';
                document.getElementById('item-type').value = 'msrp';
                document.getElementById('item-hidden').value = 'false';
                document.getElementById('item-schedule-date').value = ''; 
                document.getElementById('item-schedule-end').value = ''; 
                document.getElementById('item-condition').value = 'Mint (M)';
                document.getElementById('item-grader').value = 'PSA';
                document.getElementById('item-type').dispatchEvent(new Event('change')); 
                btn.innerText = "Save to Database";
                
                loadItems();
            } catch(e) { alert("Save Failed."); btn.innerText = "Save to Database"; }
        }

        function formatLiteralDate(val) {
            if (!val) return "";
            if (val.indexOf('T') === -1) return val;
            try {
                const [datePart, timePart] = val.split('T');
                if(!timePart) return val;
                const [year, month, day] = datePart.split('-');
                let [hour, minute] = timePart.split(':');
                let h = parseInt(hour);
                let ampm = 'AM';
                if (h >= 12) { ampm = 'PM'; if (h > 12) h -= 12; }
                if (h === 0) h = 12;
                return `${month}/${day} @ ${h}:${minute}${ampm}`;
            } catch(e) { return val; }
        }

        async function loadItems() {
            try {
                const res = await fetch(`${API_URL}/items`);
                const items = await res.json();
                if(items.error) { alert("DATABASE ERROR: " + items.error); return; }

                items.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
                allItems = items;
                renderInventory();
            } catch(e) { console.error("Load Error", e); }
        }

        function renderInventory() {
            const listContainer = document.getElementById('inventory-list');
            const searchQuery = document.getElementById('inventory-search').value.toLowerCase();
            
            let filteredItems = allItems.filter(item => {
                if (currentTab === 'breaks' && (item.type === 'slab' || item.type === 'raw')) return false;
                if (currentTab === 'slabs' && item.type !== 'slab') return false;
                if (currentTab === 'raw' && item.type !== 'raw') return false;
                
                const searchStr = `${item.name} ${item.grader || ''} ${item.condition || ''} ${item.type}`.toLowerCase();
                if (searchQuery && !searchStr.includes(searchQuery)) return false;

                return true;
            });

            if (filteredItems.length === 0) {
                listContainer.innerHTML = '<div class="empty-state">No items found matching your search.</div>';
                return;
            }

            let html = '';
            filteredItems.forEach(item => {
                let badgeClass = 'b-msrp';
                let badgeText = 'MSRP';

                if (item.type === 'baller') { badgeClass = 'b-baller'; badgeText = '<i class="ph-fill ph-crown"></i> BALLER'; } 
                else if (item.type === 'bundle') { badgeClass = 'b-bundle'; badgeText = '<i class="ph-fill ph-sketch-logo"></i> BUNDLE'; }
                else if (item.type === 'slab') { 
                    if(item.grader === 'PSA') badgeClass = 'b-psa';
                    else if(item.grader === 'BGS') badgeClass = 'b-bgs';
                    else if(item.grader === 'CGC') badgeClass = 'b-cgc';
                    else if(item.grader === 'SGC') badgeClass = 'b-sgc';
                    else if(item.grader === 'ACE') badgeClass = 'b-ace';
                    else badgeClass = 'b-slab';
                    badgeText = `🔍 ${item.grader || 'SLAB'}`; 
                }
                else if (item.type === 'raw') { badgeClass = 'b-raw'; badgeText = '🃏 RAW'; }
                
                const hiddenBadge = item.hidden ? '<span class="badge b-hidden"><i class="ph-fill ph-eye-slash"></i> HIDDEN</span>' : '';
                const condBadge = item.type === 'raw' && item.condition ? `<span class="badge b-cond">${item.condition}</span>` : '';
                const imgCount = item.images && item.images.length > 1 ? `<span class="badge" style="background:#444; border:1px solid #777;"><i class="ph-fill ph-images"></i> ${item.images.length}</span>` : '';
                const opacity = item.hidden ? 'opacity: 0.6;' : '';
                
                let timeBadge = '';
                if (item.scheduleDate) {
                    const start = formatLiteralDate(item.scheduleDate);
                    const end = item.scheduleEnd ? formatLiteralDate(item.scheduleEnd) : '...';
                    timeBadge = `<span class="badge b-time"><i class="ph-fill ph-clock"></i> ${start} ➔ ${end}</span>`;
                }

                html += `
                    <li style="${opacity}">
                        <div class="item-content">
                            <div class="item-header">
                                <span class="item-title">${item.name}</span>
                                ${hiddenBadge}
                                <span class="badge ${badgeClass}">${badgeText}</span> 
                                ${condBadge}
                                ${imgCount}
                            </div>
                            <div class="item-meta">
                                ${timeBadge}
                            </div>
                            <div class="item-meta">
                                <span><strong>$${item.price}</strong></span>
                                <span>• Stock: ${item.stock}</span>
                                <span class="click-badge">🖱️ ${item.clickCount||0}</span>
                            </div>
                        </div>
                        <div class="btn-group">
                            <button class="btn-edit" onclick="startEditing('${item.id}')">Edit</button>
                            <button class="btn-del" onclick="deleteItem('${item.id}')">Del</button>
                        </div>
                    </li>`;
            });
            
            listContainer.innerHTML = html;
        }

        function startEditing(id) {
            const item = allItems.find(i => i.id === id);
            if(item) {
                editingId = item.id; 
                currentImage = item.image || ''; 
                currentImages = item.images || (item.image ? [item.image] : []);
                currentCreatedAt = item.createdAt;
                currentClicks = item.clickCount || 0; 
                
                document.getElementById('item-type').value = item.type || 'msrp';
                document.getElementById('item-hidden').value = item.hidden ? 'true' : 'false';
                
                const dateVal = item.scheduleDate || '';
                if(dateVal.indexOf('T') > -1) document.getElementById('item-schedule-date').value = dateVal;
                else document.getElementById('item-schedule-date').value = ''; 
                
                const endVal = item.scheduleEnd || '';
                if(endVal.indexOf('T') > -1) document.getElementById('item-schedule-end').value = endVal;
                else document.getElementById('item-schedule-end').value = '';

                document.getElementById('item-name').value = item.name;
                document.getElementById('item-description').value = item.description;
                document.getElementById('item-price').value = item.price;
                document.getElementById('item-stock').value = item.stock;
                document.getElementById('item-google-form-link').value = item.googleFormLink;
                document.getElementById('item-image').value = ''; 
                
                document.getElementById('item-condition').value = item.condition || 'Mint (M)';
                document.getElementById('item-grader').value = item.grader || 'PSA';
                document.getElementById('item-type').dispatchEvent(new Event('change'));

                document.getElementById('submit-btn').innerText = "Update Database Item";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        async function deleteItem(id) { if(confirm('Are you sure you want to permanently delete this?')) { await fetch(`${API_URL}/items/${id}`, {method:'DELETE'}); loadItems(); } }
        function logout() { localStorage.removeItem('adminToken'); location.reload(); }
    </script>
</body>
</html>
